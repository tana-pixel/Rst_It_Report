<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ระบบบริหารจัดการหอพัก ProLiving</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { 
      font-family: 'Chakra Petch', sans-serif; 
      /* บังคับพื้นหลังไล่เฉดสีเทานมสว่างและฟ้าจาง ไม่ดำแน่นอน */
      background: linear-gradient(135deg, #e2e8f0 0%, #f1f5f9 100%) !important; 
      min-height: 100vh;
    }
    /* เอฟเฟกต์แผ่นแก้วโปร่งแสงโทนสว่าง (Light Glassmorphism) */
    .light-glass {
      background: rgba(255, 255, 255, 0.45) !important;
      backdrop-filter: blur(16px) !important;
      -webkit-backdrop-filter: blur(16px) !important;
      border: 1px solid rgba(255, 255, 255, 0.6) !important;
    }
    .light-glass-input {
      background: rgba(255, 255, 255, 0.6) !important;
      border: 1px solid rgba(148, 163, 184, 0.3) !important;
      color: #1e293b !important;
    }
    .light-glass-input:focus {
      border-color: #4f46e5 !important;
      background: rgba(255, 255, 255, 0.9) !important;
    }
  </style>
</head>
<body class="text-slate-800 min-h-screen antialiased">

  <div id="login-page" class="fixed inset-0 flex items-center justify-center p-4 z-50 bg-slate-200/60 backdrop-blur-md">
    <div class="light-glass p-8 rounded-2xl w-full max-w-sm text-center shadow-xl border border-white">
      <h2 class="text-2xl font-black text-slate-800 mb-1 tracking-wide">🏢 ระบบหอพัก ProLiving</h2>
      <p class="text-slate-500 text-xs mb-6">กรุณาเลือกสถานะเพื่อเข้าสู่ระบบ</p>
      
      <div class="space-y-3">
        <button onclick="loginAsTenant()" class="w-full bg-slate-800 hover:bg-slate-900 text-white font-bold py-3 rounded-xl text-sm transition shadow-md">
          👤 เข้าใช้งานในสิทธิ์ "ผู้เช่าห้อง" (ดูข้อมูล)
        </button>
        
        <div class="border-t border-slate-300/60 my-4 pt-4">
          <p class="text-slate-400 text-[10px] mb-2.5 font-bold uppercase tracking-wider">สำหรับแอดมิน / เจ้าของหอพัก</p>
          <div class="space-y-2">
            <input type="text" id="adminUsername" placeholder="ชื่อผู้ใช้งาน (Username)" class="light-glass-input w-full rounded-lg p-2.5 text-center text-xs focus:outline-none font-bold placeholder-slate-400">
            <input type="password" id="adminPassword" placeholder="รหัสผ่าน (Password)" class="light-glass-input w-full rounded-lg p-2.5 text-center text-xs focus:outline-none font-bold placeholder-slate-400">
          </div>
          <button onclick="loginWithBackend()" id="login-submit-btn" class="w-full mt-3 bg-indigo-600 text-white font-black py-2.5 rounded-lg text-sm hover:bg-indigo-500 transition shadow-lg shadow-indigo-600/20">
            🔐 เข้าสู่ระบบหลังบ้าน
          </button>
        </div>
      </div>
    </div>
  </div>

  <div id="main-dashboard" class="hidden container mx-auto p-4 md:p-6 max-w-6xl">
    
    <header class="mb-6 flex flex-col sm:flex-row justify-between items-center border-b border-slate-300/60 pb-4 gap-4">
      <div class="text-center sm:text-left">
        <h1 class="text-3xl font-black text-slate-800 tracking-wide flex items-center justify-center sm:justify-start gap-2">
          🏢 Dashboard 
          <span id="role-badge" class="text-[10px] px-2 py-0.5 rounded font-bold uppercase tracking-wider"></span>
        </h1>
        <p class="text-slate-500 text-xs mt-1">ระบบบริหารข้อมูลห้องพัก & บันทึกค่าไฟเรียลไทม์</p>
      </div>
      <button onclick="logout()" class="text-xs text-rose-600 hover:text-rose-700 font-bold bg-rose-50 px-3 py-1.5 rounded-md border border-rose-200 transition shadow-sm">
        🚪 ออกจากระบบ
      </button>
    </header>

    <div id="admin-tabs" class="grid grid-cols-2 gap-2 bg-slate-300/40 p-1 rounded-xl mb-6 border border-slate-300/30">
      <button onclick="switchTab('rooms')" id="btn-rooms" class="py-2.5 rounded-lg font-bold text-xs transition bg-white text-slate-800 shadow-sm flex items-center justify-center gap-1.5 border border-white">
        📊 ผังสถานะห้องพัก
      </button>
      <button onclick="switchTab('electricity')" id="btn-electricity" class="py-2.5 rounded-lg font-bold text-xs transition text-slate-500 hover:text-slate-800 flex items-center justify-center gap-1.5">
        ⚡ บันทึกค่าไฟฟ้าประจำเดือน
      </button>
    </div>

    <div id="tab-rooms" class="tab-content block">
      <div class="light-glass p-4 rounded-xl mb-6 flex flex-col md:flex-row gap-4 justify-between items-stretch md:items-center shadow-sm">
        <div>
          <span class="block text-[11px] font-bold uppercase text-slate-500 mb-1.5">เลือกดูตึก/ชั้น:</span>
          <div class="flex flex-wrap gap-1.5" id="floor-container">
            <button id="floor-btn-1" onclick="filterFloor('1')" class="floor-btn bg-indigo-600 text-white px-3 py-1.5 rounded-md font-bold text-xs transition shadow-sm">ชั้น 1 (101-120)</button>
            <button id="floor-btn-2" onclick="filterFloor('2')" class="floor-btn bg-white/60 text-slate-600 hover:text-slate-800 px-3 py-1.5 rounded-md font-bold text-xs transition border border-slate-300/40">ชั้น 2 (201-220)</button>
            <button id="floor-btn-3" onclick="filterFloor('3')" class="floor-btn bg-white/60 text-slate-600 hover:text-slate-800 px-3 py-1.5 rounded-md font-bold text-xs transition border border-slate-300/40">ชั้น 3 (301-320)</button>
            <button id="floor-btn-4" onclick="filterFloor('4')" class="floor-btn bg-white/60 text-slate-600 hover:text-slate-800 px-3 py-1.5 rounded-md font-bold text-xs transition border border-slate-300/40">ชั้น 4 (401-420)</button>
            <button id="floor-btn-5" onclick="filterFloor('5')" class="floor-btn bg-white/60 text-slate-600 hover:text-slate-800 px-3 py-1.5 rounded-md font-bold text-xs transition border border-slate-300/40">ชั้น 5 (501-520)</button>
          </div>
        </div>
        <div class="min-w-[280px]">
          <span class="block text-[11px] font-bold uppercase text-slate-500 mb-1.5">🔍 ค้นหาห้องพักด่วน:</span>
          <input type="text" id="searchRoom" onkeyup="searchRoomNumber()" placeholder="พิมพ์เลขห้องเพื่อกรอง..." class="light-glass-input w-full rounded-lg px-3 py-2 text-sm focus:outline-none font-bold placeholder-slate-400">
        </div>
      </div>

      <div class="flex gap-4 mb-4 text-xs font-bold px-1">
        <span class="flex items-center gap-1.5 text-emerald-600"><span class="w-3 h-3 rounded-full bg-emerald-500 shadow-sm"></span> ว่าง</span>
        <span class="flex items-center gap-1.5 text-rose-600"><span class="w-3 h-3 rounded-full bg-rose-500 shadow-sm"></span> ไม่ว่าง</span>
      </div>

      <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4" id="rooms-grid"></div>
    </div>

    <div id="tab-electricity" class="tab-content hidden max-w-md mx-auto light-glass p-6 rounded-2xl shadow-xl">
      <h2 class="text-xl font-bold text-slate-800 mb-4 flex items-center gap-2">⚡ บันทึกหน่วยไฟฟ้าประจำเดือน</h2>
      <form id="elecForm" onsubmit="handleElectricity(event)">
        <div class="mb-4">
          <label class="block text-slate-500 text-xs font-semibold uppercase mb-2">ระบุเลขห้องพัก</label>
          <input type="text" id="elecRoom" placeholder="เช่น 101" required class="light-glass-input w-full rounded-lg p-3 focus:outline-none font-bold placeholder-slate-400">
        </div>
        <div class="mb-6">
          <label class="block text-slate-500 text-xs font-semibold uppercase mb-2">หน่วยไฟที่จดได้ปัจจุบัน (Unit)</label>
          <input type="number" step="0.1" id="elecUnit" placeholder="เช่น 145.5" required class="light-glass-input w-full rounded-lg p-3 text-indigo-600 focus:outline-none text-2xl font-black placeholder-slate-400">
        </div>
        <button type="submit" id="elec-submit-btn" class="w-full bg-indigo-600 text-white font-black py-3 rounded-lg hover:bg-indigo-500 transition shadow-md flex items-center justify-center gap-2">💾 บันทึกข้อมูล</button>
      </form>
    </div>

  </div>

  <div id="chatModal" class="hidden fixed inset-0 bg-slate-900/30 backdrop-blur-sm flex items-center justify-center p-4 z-50">
    <div class="light-glass w-full max-w-md rounded-2xl shadow-2xl flex flex-col h-[450px] border border-white">
      <div class="p-4 border-b border-slate-300/60 flex justify-between items-center bg-white/40 rounded-t-2xl">
        <h3 id="chatTitle" class="font-bold text-slate-800 text-sm">💬 กล่องพูดคุย/บันทึกโน้ต</h3>
        <button onclick="closeChat()" class="text-slate-400 hover:text-slate-600 text-2xl font-bold">&times;</button>
      </div>
      <div id="chatBox" class="flex-1 p-4 overflow-y-auto space-y-2 bg-slate-50/50 flex flex-col"></div>
      <div class="p-3 border-t border-slate-300/60 bg-white/80 flex gap-2 rounded-b-2xl">
        <input type="text" id="chatInput" placeholder="พิมพ์ข้อความบันทึกที่นี่..." class="light-glass-input flex-1 rounded-lg px-3 py-2 text-xs focus:outline-none">
        <button onclick="sendChatMessage()" class="bg-indigo-600 text-white font-bold px-4 py-2 rounded-lg text-xs hover:bg-indigo-500 transition">ส่ง</button>
      </div>
    </div>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbxG_tf3Tq4GKBfIG0okCQmg_8mTtS8Oj14w5xigGzimQJGytzvPoXDocW1wu59LUI1N/exec";
    
    let currentFloor = '1';
    let userRole = 'tenant'; 
    let currentActiveRoom = null;
    let chatInterval = null;

    function loginAsTenant() {
      userRole = 'tenant';
      document.getElementById('admin-tabs').classList.add('hidden'); 
      setRoleBadge('ผู้เช่าห้องพัก', 'bg-slate-200 text-slate-700 border border-slate-300/60');
      enterDashboard();
    }

    async function loginWithBackend() {
      const user = document.getElementById('adminUsername').value.trim();
      const pass = document.getElementById('adminPassword').value.trim();
      const loginBtn = document.getElementById('login-submit-btn');
      
      if (!user || !pass) { alert('กรุณากรอกข้อมูลให้ครบถ้วนครับ'); return; }
      
      loginBtn.innerText = "กำลังตรวจสอบความปลอดภัย...";
      loginBtn.disabled = true;

      try {
        const res = await fetch(API_URL, {
          method: 'POST',
          body: JSON.stringify({ action: 'checkLogin', username: user, password: pass })
        });
        const result = await res.json();
        
        if (result.success) {
          userRole = result.role; 
          document.getElementById('admin-tabs').classList.remove('hidden'); 
          setRoleBadge('ผู้ดูแลระบบ', 'bg-indigo-100 text-indigo-700 border border-indigo-200');
          enterDashboard();
        } else {
          alert('❌ ' + result.message);
        }
      } catch (err) {
        alert('ระบบเกิดข้อผิดพลาดในการตรวจสอบสิทธิ์');
      } finally {
        loginBtn.innerText = "🔐 เข้าสู่ระบบหลังบ้าน";
        loginBtn.disabled = false;
      }
    }

    function setRoleBadge(text, classes) {
      const badge = document.getElementById('role-badge');
      badge.innerText = text;
      badge.className = `text-[10px] px-2 py-0.5 rounded font-bold uppercase tracking-wider ${classes}`;
    }

    function enterDashboard() {
      document.getElementById('login-page').classList.add('hidden');
      document.getElementById('main-dashboard').classList.remove('hidden');
      switchTab('rooms');
      loadRooms();
    }

    function logout() {
      document.getElementById('login-page').classList.remove('hidden');
      document.getElementById('main-dashboard').classList.add('hidden');
      clearInterval(chatInterval);
    }

    function switchTab(tabId) {
      document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
      document.getElementById('tab-' + tabId).classList.remove('hidden');
      
      document.querySelectorAll('[id^="btn-"]').forEach(btn => {
        btn.classList.remove('bg-white', 'text-slate-800', 'shadow-sm');
        btn.classList.add('text-slate-500', 'hover:text-slate-800');
      });
      document.getElementById('btn-' + tabId).classLink = "";
      document.getElementById('btn-' + tabId).className = "py-2.5 rounded-lg font-bold text-xs transition bg-white text-slate-800 shadow-sm flex items-center justify-center gap-1.5 border border-white";
    }

    function filterFloor(floorNum) {
      currentFloor = floorNum;
      document.getElementById('searchRoom').value = ''; 
      updateFloorButtonsUI();
      loadRooms();
    }

    function updateFloorButtonsUI() {
      document.querySelectorAll('.floor-btn').forEach(btn => {
        btn.className = "floor-btn bg-white/60 text-slate-600 hover:text-slate-800 px-3 py-1.5 rounded-md font-bold text-xs transition border border-slate-300/40";
      });
      const activeBtn = document.getElementById('floor-btn-' + currentFloor);
      if(activeBtn) activeBtn.className = "floor-btn bg-indigo-600 text-white px-3 py-1.5 rounded-md font-bold text-xs transition shadow-sm";
    }

    async function loadRooms() {
      const grid = document.getElementById('rooms-grid');
      grid.innerHTML = '<div class="col-span-full text-center py-8 text-slate-500 text-xs animate-pulse">กำลังซิงค์ผังห้องพักเรียลไทม์...</div>';
      
      try {
        const res = await fetch(`${API_URL}?action=getRoomsByFloor&floor=${currentFloor}`);
        const rooms = await res.json();
        renderRooms(rooms);
      } catch (e) {
        grid.innerHTML = '<div class="col-span-full text-center py-8 text-rose-600 text-xs">❌ การเชื่อมต่อล้มเหลว</div>';
      }
    }

    function renderRooms(roomsToShow) {
      const grid = document.getElementById('rooms-grid');
      grid.innerHTML = '';
      
      roomsToShow.forEach(room => {
        const roomNo = room[0]; 
        const isAvailable = room[1] === 'ว่าง'; 
        const elecUnit = room[2] || '0.0'; 
        
        // 🔮 แก้วใสขอบเรืองแสงสีพาสเทล สว่าง นุ่ม ไม่ดำแน่นอน
        const bgClass = isAvailable 
          ? 'bg-emerald-500/10 border-emerald-400/40 hover:border-emerald-500 text-slate-800 shadow-sm' 
          : 'bg-rose-500/10 border-rose-400/40 hover:border-rose-500 text-slate-800 shadow-sm';
        
        const badgeClass = isAvailable ? 'bg-emerald-600 text-white border-emerald-600' : 'bg-rose-600 text-white border-rose-600';
        const statusText = isAvailable ? 'ว่าง' : 'ไม่ว่าง';

        const isAdmin = (userRole === 'admin' || userRole === 'staff');
        const clickAction = isAdmin ? `onclick="toggleRoomStatus('${roomNo}')"` : '';
        const chatButtonHtml = isAdmin 
          ? `<button onclick="openChat('${roomNo}')" class="w-full mt-3 bg-white/80 hover:bg-white text-slate-700 py-1.5 rounded-lg text-[11px] font-bold transition border border-slate-300/60 shadow-xs">💬 ประวัติ / โน้ตห้อง</button>`
          : '';

        const cardHtml = `
          <div data-room="${roomNo}" class="${bgClass} border p-4 rounded-xl flex flex-col justify-between min-h-[120px] transition duration-200 backdrop-blur-md">
            <div class="flex justify-between items-center border-b border-slate-300/40 pb-2">
              <span class="text-2xl font-black text-slate-800 tracking-tight">${roomNo}</span>
              <span ${clickAction} class="text-[10px] font-bold ${isAdmin ? 'cursor-pointer select-none' : 'cursor-default'} px-2 py-0.5 rounded ${badgeClass}">
                ${statusText}
              </span>
            </div>
            <div class="my-2 flex justify-between items-baseline">
              <span class="text-[10px] text-slate-500 font-bold">ไฟล่าสุด:</span>
              <span class="text-xl font-black text-indigo-600">${elecUnit} <span class="text-[10px] text-slate-400 font-normal">หน่วย</span></span>
            </div>
            ${chatButtonHtml}
          </div>
        `;
        grid.insertAdjacentHTML('beforeend', cardHtml);
      });
    }

    function searchRoomNumber() {
      let input = document.getElementById('searchRoom').value.trim();
      if (input === '') {
        document.querySelectorAll('#rooms-grid > div').forEach(card => card.style.display = 'flex');
        return;
      }
      document.querySelectorAll('#rooms-grid > div').forEach(card => {
        let roomNo = card.getAttribute('data-room');
        if (roomNo) {
          card.style.display = roomNo.includes(input) ? "flex" : "none";
        }
      });
    }

    async function handleElectricity(e) {
      e.preventDefault();
      const roomNo = document.getElementById('elecRoom').value.trim();
      const unit = document.getElementById('elecUnit').value;
      const submitBtn = document.getElementById('elec-submit-btn');

      submitBtn.innerText = "กำลังบันทึกข้อมูล...";
      submitBtn.disabled = true;

      try {
        const res = await fetch(API_URL, {
          method: 'POST',
          body: JSON.stringify({ action: 'saveElectricity', roomNo: roomNo, unit: unit })
        });
        const result = await res.json();
        if(result.success) {
          alert(`🎉 บันทึกหน่วยไฟฟ้าห้อง ${roomNo} เรียบร้อย!`);
          document.getElementById('elecForm').reset();
          loadRooms();
        }
      } catch (err) {
        alert('เครือข่ายขัดข้อง');
      } finally {
        submitBtn.innerText = "💾 บันทึกข้อมูลเข้า Google Sheets";
        submitBtn.disabled = false;
      }
    }

    async function toggleRoomStatus(roomNo) {
      if(!confirm(`ต้องการสลับสถานะห้อง ${roomNo}?`)) return;
      try {
        await fetch(API_URL, {
          method: 'POST',
          body: JSON.stringify({ action: 'toggleRoomStatus', roomNo: roomNo })
        });
        loadRooms();
      } catch (err) { }
    }

    function openChat(roomNo) {
      currentActiveRoom = roomNo;
      document.getElementById('chatTitle').innerText = `💬 บันทึกโน้ตแอดมิน - ห้อง ${roomNo}`;
      document.getElementById('chatModal').classList.remove('hidden');
      fetchChatMessages();
      chatInterval = setInterval(fetchChatMessages, 4000);
    }

    function closeChat() {
      document.getElementById('chatModal').classList.add('hidden');
      clearInterval(chatInterval);
    }

    async function fetchChatMessages() {
      if (!currentActiveRoom) return;
      try {
        const res = await fetch(`${API_URL}?action=getComments&roomNo=${currentActiveRoom}`);
        const comments = await res.json();
        const chatBox = document.getElementById('chatBox');
        chatBox.innerHTML = '';
        
        if (comments.length === 0) {
          chatBox.innerHTML = `<p class="text-slate-400 text-xs text-center my-auto">ยังไม่มีบันทึกโน้ต</p>`;
          return;
        }

        comments.forEach(c => {
          const msgHtml = `
            <div class="bg-white border border-slate-200 p-2.5 rounded-xl rounded-tl-none max-w-[90%] self-start shadow-sm">
              <div class="flex justify-between gap-4 mb-0.5">
                <span class="text-[9px] text-indigo-600 font-bold">${c.user}</span>
                <span class="text-[8px] text-slate-400">${c.time}</span>
              </div>
              <p class="text-xs text-slate-700">${c.msg}</p>
            </div>`;
          chatBox.insertAdjacentHTML('beforeend', msgHtml);
        });
        chatBox.scrollTop = chatBox.scrollHeight;
      } catch (e) { }
    }

    async function sendChatMessage() {
      const input = document.getElementById('chatInput');
      if (!input.value.trim() || !currentActiveRoom) return;
      const text = input.value;
      input.value = '';

      try {
        await fetch(API_URL, {
          method: 'POST',
          body: JSON.stringify({ action: 'sendComment', roomNo: currentActiveRoom, user: 'Admin', message: text })
        });
        fetchChatMessages();
      } catch (err) { }
    }
  </script>
</body>
</html>
